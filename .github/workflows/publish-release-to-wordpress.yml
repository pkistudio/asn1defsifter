name: Publish release to WordPress

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to post, such as v0.1.0'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Publish release post to WordPress
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WPCOM_ACCESS_TOKEN: ${{ secrets.WPCOM_ACCESS_TOKEN }}
          WPCOM_SITE_ID: ${{ secrets.WPCOM_SITE_ID }}
          WP_RELEASE_CATEGORY_ID: ${{ vars.WP_RELEASE_CATEGORY_ID }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          python3 <<'PY'
          import datetime
          import html
          import json
          import os
          import re
          import urllib.parse
          import urllib.request

          product_name = "ASN.1 Definition Sifter"
          package_name = "@pkistudio/asn1defsifter"
          pages_url = "https://pkistudio.github.io/asn1defsifter/"
          npm_url = "https://www.npmjs.com/package/@pkistudio/asn1defsifter"

          token = os.environ["WPCOM_ACCESS_TOKEN"]
          site_id = os.environ["WPCOM_SITE_ID"]
          github_token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          event_name = os.environ["GITHUB_EVENT_NAME"]
          category_id = os.environ.get("WP_RELEASE_CATEGORY_ID") or ""

          def make_slug(text):
              text = text.lower()
              text = re.sub(r"[^a-z0-9]+", "-", text)
              return text.strip("-")

          def request_json(method, url, payload=None, headers=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")

              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Content-Type", "application/json")
              for key, value in (headers or {}).items():
                  req.add_header(key, value)

              with urllib.request.urlopen(req) as res:
                  return json.loads(res.read().decode("utf-8"))

          def github_request(path):
              url = f"https://api.github.com/repos/{repository}{path}"
              return request_json(
                  "GET",
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {github_token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )

          def wp_request(method, path, payload=None):
              api_url = f"https://public-api.wordpress.com/wp/v2/sites/{site_id}{path}"
              return request_json(
                  method,
                  api_url,
                  payload,
                  headers={"Authorization": f"Bearer {token}"},
              )

          if event_name == "workflow_dispatch":
              tag = os.environ["INPUT_TAG"]
              release = github_request(f"/releases/tags/{urllib.parse.quote(tag, safe='')}")
              name = release.get("name") or tag
              url = release["html_url"]
              body = release.get("body") or ""
              published_at = release.get("published_at") or ""
          else:
              tag = os.environ["RELEASE_TAG"]
              name = os.environ.get("RELEASE_NAME") or tag
              url = os.environ["RELEASE_URL"]
              body = os.environ.get("RELEASE_BODY") or ""
              published_at = os.environ.get("RELEASE_PUBLISHED_AT") or ""

          if not published_at:
              published_at = datetime.datetime.now(datetime.timezone.utc).isoformat()

          slug = make_slug(f"asn1defsifter-{tag}")
          title = f"{product_name} {tag} をリリースしました"
          release_body = body.strip() or "詳細はGitHub Releaseを参照してください。"

          content = f"""
          <p><strong>{html.escape(product_name)} の新しいリリースを公開しました。</strong></p>

          <ul>
            <li>リリース名: {html.escape(name)}</li>
            <li>タグ: <code>{html.escape(tag)}</code></li>
            <li>npmパッケージ: <code>{html.escape(package_name)}</code></li>
            <li>公開日時: {html.escape(published_at)}</li>
            <li><a href="{html.escape(url)}">GitHub Release を見る</a></li>
            <li><a href="{html.escape(npm_url)}">npm パッケージを見る</a></li>
            <li><a href="{html.escape(pages_url)}">ブラウザ版を開く</a></li>
          </ul>

          <h3>リリースノート</h3>
          <pre>{html.escape(release_body)}</pre>
          """

          payload = {
              "title": title,
              "slug": slug,
              "content": content,
              "excerpt": f"{product_name} {tag} のリリース情報です。",
              "status": "publish",
          }

          if category_id:
              payload["categories"] = [int(category_id)]

          query = urllib.parse.urlencode(
              {
                  "slug": slug,
                  "status": "publish,draft,pending,private,future",
              },
              safe=",",
          )
          existing = wp_request("GET", f"/posts?{query}")

          if existing:
              post_id = existing[0]["id"]
              result = wp_request("POST", f"/posts/{post_id}", payload)
              print("Updated:", result.get("link"))
          else:
              result = wp_request("POST", "/posts", payload)
              print("Created:", result.get("link"))
          PY